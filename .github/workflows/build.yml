name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: npx tsc --noEmit

  tag:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: lint
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and tag
        id: bump
        run: |
          # Get latest tag, default to v0.0.0 if none exists
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "${LATEST}" ]; then
            LATEST="v0.0.0"
          fi

          # Parse and bump patch
          MAJOR=$(echo "${LATEST}" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "${LATEST}" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "${LATEST}" | sed 's/v//' | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "Bumping ${LATEST} → ${NEW_TAG}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
          git push origin "${NEW_TAG}"

  build:
    needs: tag
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    steps:
      - name: Install base tools
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            git curl wget ca-certificates unzip \
            build-essential pkg-config \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-bookworm-arm64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-bookworm-arm64-

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: bun install

      - name: Set version from git tag
        run: |
          VERSION="${{ needs.tag.outputs.new_tag }}"
          VERSION="${VERSION#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json
          echo "Building version: ${VERSION}"

      - name: Build Tauri app
        run: bun run tauri build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: klipper-touch-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  release:
    needs: [tag, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: klipper-touch-deb
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true
          files: dist/*.deb
